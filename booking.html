<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Book Event | EventHub</title>

    <link rel="stylesheet"
          href="assets/css/style.css">

    <link rel="stylesheet"
          href="assets/css/booking.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<header>

<nav class="navbar">

<div class="logo">

EventHub

</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="events.html">Events</a></li>

<li><a href="my-bookings.html">My Bookings</a></li>

<li><a href="profile.html">Profile</a></li>

</ul>

</nav>

</header>

<!-- ================= BOOKING ================= -->

<section class="booking-section">

<div class="booking-container">

<h1>

Book Your Event

</h1>

<form id="bookingForm">

<!-- Event Name -->

<div class="input-group">

<label>

Event Name

</label>

<input
type="text"
id="eventName"
readonly>

</div>

<!-- Ticket Price -->

<div class="input-group">

<label>

Ticket Price

</label>

<input
type="text"
id="ticketPrice"
readonly>

</div>

<!-- User Name -->

<div class="input-group">

<label>

Full Name

</label>

<input
type="text"
id="fullName"
placeholder="Enter your full name"
required>

</div>

<!-- Email -->

<div class="input-group">

<label>

Email Address

</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<!-- Phone -->

<div class="input-group">

<label>

Phone Number

</label>

<input
type="tel"
id="phone"
placeholder="Enter phone number"
required>

</div>

<!-- Tickets -->

<div class="input-group">

<label>

Number of Tickets

</label>

<input
type="number"
id="tickets"
min="1"
value="1"
required>

</div>

<!-- Total -->

<div class="input-group">

<label>

Total Amount

</label>

<input
type="text"
id="totalAmount"
readonly>

</div>

<!-- Payment -->

<div class="input-group">

<label>

Payment Method

</label>

<select id="paymentMethod">

<option value="UPI">UPI</option>

<option value="Credit Card">Credit Card</option>

<option value="Debit Card">Debit Card</option>

<option value="Net Banking">Net Banking</option>

<option value="Cash">Cash</option>

</select>

</div>

<!-- Submit -->

<button
type="submit"
class="book-btn">

Confirm Booking

</button>

<a
href="events.html"
class="cancel-btn">

Cancel

</a>

</form>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

<p>

© 2026 EventHub |
All Rights Reserved

</p>

</footer>

<script src="assets/js/booking.js"></script>

</body>

</html>
